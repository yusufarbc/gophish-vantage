services:
  vantage-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vantage-app
    restart: unless-stopped
    environment:
      # Admin and Phishing server ports can be customized here
      GOPHISH_ADMIN_PORT: "3333"
      GOPHISH_PHISH_PORT: "80"
    ports:
      - "3333:3333"  # Admin UI
      - "8080:80"    # Phishing server (HTTP)
      - "9090:9090"  # Chisel reverse tunnel listener (agent connects here)
    volumes:
      - gophish_data:/app/data
      - ./config.json:/app/config.json:ro
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://localhost:3333/login"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    cap_add:
      - NET_RAW      # Required for ICMP/raw socket operations in scanning
      - NET_ADMIN    # For interface management (create TUN devices, set routes)
    devices:
      - /dev/net/tun:/dev/net/tun  # Required for Chisel reverse TUN tunnel
    security_opt:
      - seccomp:unconfined  # Allow unconfined syscalls for scanning tools
    privileged: true
    networks:
      - gophish-net
    depends_on:
      - postfix

  # Optional standalone upstream engine service name for split deployments.
  # In this fork, vantage-app already embeds the gophish engine runtime.
  gophish-engine:
    image: vantage-app:latest
    profiles: ["split"]
    depends_on:
      - vantage-app
    networks:
      - gophish-net

  # Postfix for local mail delivery
  postfix:
    image: boky/postfix:latest
    container_name: gophish-postfix
    restart: unless-stopped
    environment:
      HOSTNAME: "gophish.local"
      ALLOWED_SENDER_DOMAINS: "localhost gophish.local 127.0.0.1"
      # Set to your SMTP relay if needed (optional)
      # RELAYHOST: "[smtp.relay.com]:587"
      # RELAYHOST_USERNAME: "username"
      # RELAYHOST_PASSWORD: "password"
    ports:
      - "25:25"      # SMTP (for local delivery)
    volumes:
      - postfix_data:/var/lib/postfix
      - postfix_queue:/var/spool/postfix
    networks:
      - gophish-net
    healthcheck:
      test: ["CMD", "postfix", "status"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Reverse proxy with TLS termination and basic auth
  caddy:
    image: caddy:latest
    container_name: gophish-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN:-localhost}"
      VANTAGE_PASSWORD_HASH: "${VANTAGE_PASSWORD_HASH}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      vantage-app:
        condition: service_healthy
    networks:
      - gophish-net
    cap_add:
      - NET_BIND_SERVICE

  # Optional: Tailscale VPN integration for internal network scanning
  # Uncomment and configure to use Tailscale for VPN-based scanning
  # tailscale:
  #   image: tailscale/tailscale:latest
  #   container_name: gophish-tailscale
  #   restart: unless-stopped
  #   volumes:
  #     - tailscale_data:/var/lib/tailscale
  #     - /dev/net/tun:/dev/net/tun
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_MODULE
  #   environment:
  #     TS_AUTHKEY: "${TAILSCALE_AUTH_KEY}"
  #   networks:
  #     - gophish-net

networks:
  gophish-net:
    driver: bridge
    # For VPN support with host network (uncomment if using Tailscale/WireGuard):
    # driver: bridge
    # driver_opts:
    #   com.docker.network.driver.mtu: 1500

volumes:
  gophish_data:
  postfix_data:
  postfix_queue:
  caddy_data:
  caddy_config:
  # tailscale_data:
