version: '3.8'

services:
  vantage:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vantage-app
    restart: always
    # Drop all privileges by default, but specifically add back those required
    # for Naabu (NET_RAW/NET_ADMIN) and Chisel TUN (NET_ADMIN).
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    ports:
      - "3333:3333" # Admin Dashboard
      - "8080:8080" # Phishing Listener (Go app port 8080)
    volumes:
      - ./vantage_data:/opt/vantage/vantage_data
      - ./vantage_data/vantage.db:/opt/vantage/vantage.db
      - ./vantage_data/logs:/opt/vantage/static/endpoint/logs
      - ./config.json:/opt/vantage/config.json
    environment:
      - GOPROXY=https://proxy.golang.org,direct
      - ADMIN_PASS_HASH=${VANTAGE_ADMIN_PASS_HASH}
    networks:
      - vantage-net

  caddy:
    image: caddy:latest
    container_name: vantage-proxy
    restart: always
    ports:
      - "80:80"   # Public HTTP
      - "443:443" # Public HTTPS
      - "3334:3333" # Hardened Admin Access (mapping host 3334 to container 3333)
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile
      - vantage_proxy_data:/data
      - vantage_proxy_config:/config
      - ./vantage_data/caddy_logs:/var/log/caddy
    environment:
      - ADMIN_PASS_HASH=${VANTAGE_ADMIN_PASS_HASH}
    networks:
      - vantage-net
    depends_on:
      - vantage

networks:
  vantage-net:
    driver: bridge

volumes:
  vantage_proxy_data:
  vantage_proxy_config:
