{{define "vantage/live_logs"}}
<div class="glass-card rounded-lg border border-vantage-border overflow-hidden shadow-2xl shadow-black/40">
    <div class="bg-gradient-to-r from-gray-900 to-black/50 px-6 py-4 border-b border-vantage-border flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="flex gap-1.5">
                <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
            </div>
            <h4 class="font-mono text-sm font-semibold ml-2 tracking-tight">Live Scanner Output</h4>
        </div>
        <span class="px-2.5 py-1 rounded-md text-[10px] bg-red-900/40 text-red-300 border border-red-800/30 font-bold uppercase tracking-widest animate-pulse" id="scanner-status" style="display:none;">SCANNING...</span>
    </div>
    <div class="h-[400px] overflow-y-auto bg-black/90 p-5 space-y-1 font-mono text-xs custom-scrollbar" id="scanner-logs" style="box-shadow: inset 0 0 20px rgba(0,0,0,0.5);">
        <p class="terminal-line text-blue-400 opacity-80">[READY] Awaiting scan initialization...</p>
    </div>
</div>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1f1f1f; border-radius: 4px; border: 2px solid #0a0a0a; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #2f2f2f; }
</style>
{{end}}
